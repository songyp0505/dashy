---
pageInfo:
  title: SuperYP Start
  description: AI / Dev / Community
  navLinks: []

appConfig:
  theme: zinc
  dayTheme: zinc
  nightTheme: zinc
  layout: auto
  colCount: 3
  iconSize: medium
  language: zh-CN
  defaultOpeningMethod: newtab
  statusCheck: false
  pingCheckEnabled: false
  preventWriteToDisk: true
  disableConfiguration: true
  hideComponents:
    hideSearch: true
    hideSettings: true
  webSearch:
    searchEngine: duckduckgo
    openingMethod: newtab
    openUrlsDirectly: true
  customColors:
    zinc:
      primary: "#38bdf8"
  customCss: >-
    header{max-width:1120px;margin:0 auto;padding:28px 24px 12px!important}
    header .page-titles h1{font-size:28px!important;font-weight:650!important}
    header .page-titles span.subtitle{font-size:14px!important;opacity:.72}
    section.settings-outer{display:none!important}
    .item-group-container{max-width:1120px;margin:0 auto!important;padding:8px 24px 36px!important}
    .collapsable{border-radius:8px!important}
    .section-header{padding:12px 14px!important}
    .section-header h3{font-size:16px!important}
    .header-action,.opening-method-icon{display:none!important}
    .item{min-height:64px!important}

sections:
  - name: AI
    icon: fas fa-magic
    displayData:
      itemSize: medium
    items:
      - { title: Gemini, description: Google AI, url: "https://gemini.google.com/app", icon: favicon }

  - name: Dev
    icon: fas fa-code
    displayData:
      itemSize: medium
    items:
      - { title: GitHub, description: Repositories, url: "https://github.com/", icon: si-github }
      - { title: Vercel, description: Deployments, url: "https://vercel.com/songyp0505s-projects/", icon: si-vercel }
      - { title: Cloudflare, description: DNS / Domains, url: "https://dash.cloudflare.com/", icon: si-cloudflare }

  - name: Community
    icon: fas fa-comments
    displayData:
      itemSize: medium
    items:
      - { title: V2EX, url: "https://www.v2ex.com/", icon: favicon }
      - { title: NodeSeek, url: "https://www.nodeseek.com/", icon: favicon }
      - { title: Linux.do, url: "https://linux.do/", icon: favicon }
      - { title: Hacker News, url: "https://news.ycombinator.com/", icon: si-ycombinator }
      - { title: X, url: "https://x.com/", icon: si-x }

  - name: Affairs
    icon: fas fa-folder-open
    displayData:
      itemSize: medium
    items:
      - { title: CCopyright, description: Copyright, url: "https://www.ccopyright.com/", icon: favicon }
      - { title: 教务系统, description: Campus, url: "https://jiaowu.rzmevc.edu.cn/admin", icon: favicon }
